<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050914" />
  <title>Jerry Nnamdi Offorka | Mental Health Consultant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-shell home-page">
  <div class="ambient" aria-hidden="true">
    <span class="orb orb-a"></span><span class="orb orb-b"></span><span class="orb orb-c"></span>
    <canvas id="particles"></canvas>
  </div>

  <main class="phone-stage">
    <header class="topbar">
      <button class="icon-glass launcher-toggle" aria-label="Open launcher">
        <span class="dot-grid"><i></i><i></i><i></i><i></i></span>
      </button>
      <div class="brand-title">
        <h1>Jerry Nnamdi Offorka</h1>
        <p>Founder • Mental Health Consultant</p>
      </div>
      <button class="icon-glass theme-toggle" aria-label="Toggle glow mode">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.2A8.4 8.4 0 0 1 9.8 3a7.5 7.5 0 1 0 11.2 11.2Z"/></svg>
      </button>
    </header>

    <section class="hub" aria-label="Jerry OS control hub">
      <div class="service-node node-speaking" data-service="speaking" data-url="speaking.html">
        <svg viewBox="0 0 24 24"><path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4Zm7-4a7 7 0 0 1-14 0M12 17v4m-4 0h8"/></svg>
        <span>Speaking</span>
      </div>
      <div class="service-node node-consulting" data-service="consulting" data-url="consulting.html">
        <svg viewBox="0 0 24 24"><path d="M8 12h8m-7 4h6M7 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3l-2-2h-4L8 5H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/></svg>
        <span>Consulting</span>
      </div>
      <div class="service-node node-media" data-service="media" data-url="media.html">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z"/></svg>
        <span>Books & Media</span>
      </div>
      <div class="service-node node-booking" data-service="booking" data-url="https://speakoutmentalhealth.org">
        <svg viewBox="0 0 24 24"><path d="M7 3v4m10-4v4M4 9h16M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm3 8h.01M12 13h.01M16 13h.01M8 17h.01M12 17h.01"/></svg>
        <span>Book</span>
      </div>

      <div class="halo" aria-hidden="true"><i></i><i></i><i></i></div>

      <button class="portrait-control" id="portraitControl" aria-label="Drag Jerry portrait to select a service">
        <img src="images/jerry-profile.jpg" alt="Jerry Nnamdi Offorka" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" />
        <span class="portrait-fallback">JNO</span>
        <span class="shine"></span>
      </button>

      <p class="hint" id="hubHint">Touch the portrait and move</p>
    </section>
  </main>

  <nav class="dock" aria-label="Primary navigation">
    <a class="active" href="index.html"><svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9Z"/></svg><span>Home</span></a>
    <a href="about.html"><svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 1 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/></svg><span>About</span></a>
    <a href="index.html" class="hub-dot"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2"/></svg><span>Hub</span></a>
    <a href="https://speakoutmentalhealth.org"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 0c3 3 4 6 4 10s-1 7-4 10c-3-3-4-6-4-10s1-7 4-10ZM2 12h20"/></svg><span>SpeakOut</span></a>
    <a href="contact.html"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4V5Zm0 2 8 6 8-6"/></svg><span>Contact</span></a>
  </nav>

  <div class="launcher" id="launcher" aria-hidden="true">
    <button class="launcher-close" aria-label="Close launcher"></button>
    <a href="about.html">About</a><a href="speaking.html">Speaking</a><a href="consulting.html">Consulting</a><a href="media.html">Books & Media</a><a href="contact.html">Contact</a><a href="https://speakoutmentalhealth.org">SpeakOut</a>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
