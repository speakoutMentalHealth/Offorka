<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <title>Jerry Nnamdi Ofoka | Mental Health Consultant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <button class="icon-btn menu-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

      <div class="brand-block">
        <p class="eyebrow">Official Profile</p>
        <h1>Jerry Nnamdi Ofoka</h1>
        <p>Mental Health Consultant</p>
      </div>

      <div class="top-actions">
        <button class="icon-btn theme-toggle" aria-label="Toggle glow mode">☾</button>
        <button class="icon-btn profile-btn" aria-label="Profile">♙</button>
      </div>
    </header>

    <section class="hero-console" aria-label="Interactive service console">
      <div class="ambient-ring ring-one"></div>
      <div class="ambient-ring ring-two"></div>
      <div class="ambient-ring ring-three"></div>

      <a class="service-orb orb-top" data-direction="up" href="https://speakoutmentalhealth.org" target="_blank" rel="noopener">
        <span class="service-icon">♚</span>
        <strong>Speaking</strong>
      </a>

      <a class="service-orb orb-left" data-direction="left" href="https://speakoutmentalhealth.org" target="_blank" rel="noopener">
        <span class="service-icon">☏</span>
        <strong>Consulting</strong>
      </a>

      <a class="service-orb orb-right" data-direction="right" href="https://speakoutmentalhealth.org" target="_blank" rel="noopener">
        <span class="service-icon">▱</span>
        <strong>Books<br>& Media</strong>
      </a>

      <a class="service-orb orb-bottom" data-direction="down" href="https://speakoutmentalhealth.org" target="_blank" rel="noopener">
        <span class="service-icon">▣</span>
        <strong>Book<br>Appointment</strong>
      </a>

      <div class="connection-line line-up"></div>
      <div class="connection-line line-down"></div>
      <div class="connection-line line-left"></div>
      <div class="connection-line line-right"></div>

      <div class="control-stage" id="controlStage">
        <div class="scan-glow"></div>
        <button class="portrait-pad" id="portraitPad" aria-label="Interactive control pad. Drag or tap up, down, left, or right.">
          <span class="portrait-ring"></span>
          <img src="images/jerry-profile.jpg" alt="Jerry Nnamdi Ofoka" onerror="this.src='images/profile-placeholder.svg'" />
          <span class="joystick-knob" id="joystickKnob"></span>
          <span class="direction-hint hint-up">↑</span>
          <span class="direction-hint hint-down">↓</span>
          <span class="direction-hint hint-left">←</span>
          <span class="direction-hint hint-right">→</span>
        </button>
      </div>

      <p class="micro-copy" id="microCopy">Drag the centre control or tap a direction</p>
    </section>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <a class="active" href="index.html"><span>⌂</span><small>Home</small></a>
      <a href="#about"><span>♙</span><small>About</small></a>
      <a href="mailto:speaakout@gmail.com"><span>✉</span><small>Contact</small></a>
      <a href="https://speakoutmentalhealth.org" target="_blank" rel="noopener"><span>◎</span><small>SpeakOut</small></a>
    </nav>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
